<h1 *ngIf='isLogin'>Welcome User</h1>
<hr>
<div>
  <ul *ngFor="let city of cities">
    <li>{{city}}</li>
  </ul>
</div>

<h1>{{pcolor}}</h1>

<div [ngSwitch]="pcolor">
  <p *ngSwitchCase="'red'">The color is Red</p>
  <p *ngSwitchCase="'blue'">The color is Blue</p>
  <p *ngSwitchDefault="'unknown'">The color is Unknown</p>


</div>
